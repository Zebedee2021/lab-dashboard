<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>810 Lab - 反馈记录</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-white border-b border-gray-200 sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-14">
      <span class="text-lg font-bold text-gray-900">810 Lab Dashboard</span>
      <div class="flex items-center gap-4">
        <nav class="hidden sm:flex items-center gap-1 text-sm">
          <a href="dashboard.html" class="px-3 py-1.5 rounded-md text-gray-600 hover:bg-gray-100">项目看板</a>
          <a href="person.html" class="px-3 py-1.5 rounded-md text-gray-600 hover:bg-gray-100">人员周报</a>
          <a href="risks.html" class="px-3 py-1.5 rounded-md text-gray-600 hover:bg-gray-100">风险追踪</a>
          <a href="feedback.html" class="px-3 py-1.5 rounded-md bg-blue-50 text-blue-700 font-medium">反馈记录</a>
        </nav>
        <button onclick="Auth.logout()" class="text-sm text-gray-400 hover:text-gray-600">退出</button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <h1 class="text-xl font-bold text-gray-900 mb-1">反馈记录</h1>
    <p class="text-sm text-gray-500 mb-6">管理层对周报的评价与反馈</p>

    <div id="feedback-list" class="space-y-6">
      <div class="flex items-center justify-center py-20">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
      </div>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/data-loader.js"></script>
  <script>
    if (!Auth.requireAuth()) throw new Error('Not authenticated');

    const typeLabels = {
      action_required: { text: '需行动', cls: 'bg-red-100 text-red-700' },
      concern: { text: '关注', cls: 'bg-orange-100 text-orange-700' },
      improvement: { text: '改进', cls: 'bg-yellow-100 text-yellow-700' },
      decision_needed: { text: '待决策', cls: 'bg-purple-100 text-purple-700' },
      overall: { text: '整体', cls: 'bg-blue-100 text-blue-700' },
    };

    async function init() {
      const data = await DataLoader.load('feedback');
      if (!data || !data.feedbacks) {
        document.getElementById('feedback-list').innerHTML = '<p class="text-center text-gray-400 py-10">暂无反馈记录</p>';
        return;
      }

      const feedbacks = data.feedbacks;
      document.getElementById('feedback-list').innerHTML = feedbacks.map(fb => `
        <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
          <div class="px-5 py-4 bg-gray-50 border-b border-gray-200">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-blue-600 flex items-center justify-center text-sm font-bold text-white">${fb.from.slice(-2)}</div>
                <div>
                  <span class="font-medium text-gray-900">${fb.from}</span>
                  <span class="text-gray-400 mx-1.5">-></span>
                  <span class="font-medium text-gray-700">${fb.to}</span>
                </div>
              </div>
              <div class="text-sm text-gray-500">
                ${fb.date} <span class="text-gray-300 ml-1">${fb.target_report_week}</span>
              </div>
            </div>
          </div>
          <div class="divide-y divide-gray-100">
            ${fb.items.map(item => {
              const t = typeLabels[item.type] || { text: item.type, cls: 'bg-gray-100 text-gray-600' };
              return `
              <div class="px-5 py-3 flex items-start gap-3">
                <span class="mt-0.5 px-2 py-0.5 rounded text-xs font-medium flex-shrink-0 ${t.cls}">${t.text}</span>
                <div>
                  <div class="text-xs text-gray-400 mb-0.5">${item.project}</div>
                  <div class="text-sm text-gray-800">${item.content}</div>
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>
      `).join('');
    }

    init();
  </script>
</body>
</html>
