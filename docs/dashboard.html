<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>810 Lab Dashboard - 项目看板</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-white border-b border-gray-200 sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-14">
      <div class="flex items-center gap-3">
        <span class="text-lg font-bold text-gray-900">810 Lab Dashboard</span>
        <span class="text-xs text-gray-400" id="meta-info"></span>
      </div>
      <div class="flex items-center gap-4">
        <nav class="hidden sm:flex items-center gap-1 text-sm">
          <a href="dashboard.html" class="px-3 py-1.5 rounded-md bg-blue-50 text-blue-700 font-medium">项目看板</a>
          <a href="person.html" class="px-3 py-1.5 rounded-md text-gray-600 hover:bg-gray-100">人员周报</a>
          <a href="risks.html" class="px-3 py-1.5 rounded-md text-gray-600 hover:bg-gray-100">风险追踪</a>
          <a href="feedback.html" class="px-3 py-1.5 rounded-md text-gray-600 hover:bg-gray-100">反馈记录</a>
        </nav>
        <button onclick="Auth.logout()" class="text-sm text-gray-400 hover:text-gray-600">退出</button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <!-- 统计卡片 -->
    <div id="stats" class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6"></div>
    <!-- 项目卡片网格 -->
    <div id="project-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <div class="col-span-full flex items-center justify-center py-20">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
        <span class="ml-3 text-gray-500">加载中...</span>
      </div>
    </div>
  </main>

  <!-- 项目详情弹窗 -->
  <div id="modal-overlay" class="fixed inset-0 bg-black/40 z-40 hidden" onclick="closeModal()"></div>
  <div id="modal" class="fixed inset-y-0 right-0 w-full max-w-2xl bg-white shadow-2xl z-50 overflow-y-auto transform translate-x-full transition-transform duration-300">
    <div id="modal-content" class="p-6"></div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/data-loader.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (!Auth.requireAuth()) throw new Error('Not authenticated');

    const levelColors = {
      red:    { bg: 'bg-red-50', border: 'border-red-200', dot: 'bg-red-500', text: 'text-red-700', badge: 'bg-red-100 text-red-700' },
      yellow: { bg: 'bg-yellow-50', border: 'border-yellow-200', dot: 'bg-yellow-500', text: 'text-yellow-700', badge: 'bg-yellow-100 text-yellow-700' },
      green:  { bg: 'bg-green-50', border: 'border-green-200', dot: 'bg-green-500', text: 'text-green-700', badge: 'bg-green-100 text-green-700' },
      gray:   { bg: 'bg-gray-50', border: 'border-gray-200', dot: 'bg-gray-400', text: 'text-gray-600', badge: 'bg-gray-100 text-gray-600' },
    };

    let allData = {};

    async function init() {
      allData = await DataLoader.loadAll();
      if (!allData.projects) {
        document.getElementById('project-grid').innerHTML = '<p class="col-span-full text-center text-red-500 py-10">数据加载失败，请刷新页面</p>';
        return;
      }
      renderStats();
      renderProjects();
    }

    function renderStats() {
      const p = allData.projects;
      const r = allData.risks;
      const t = allData.timeline;
      const pe = allData.people;

      const projectCount = p.projects.length;
      const riskCount = r ? r.risks.filter(x => x.status === 'open').length : 0;
      const reportCount = p.meta.total_reports;
      const peopleCount = pe ? pe.people.length : 0;

      const stats = [
        { label: '项目总数', value: projectCount, color: 'blue' },
        { label: '未关闭风险', value: riskCount, color: riskCount > 5 ? 'red' : 'yellow' },
        { label: '周报总数', value: reportCount, color: 'green' },
        { label: '团队人数', value: peopleCount, color: 'purple' },
      ];

      document.getElementById('stats').innerHTML = stats.map(s => `
        <div class="bg-white rounded-xl border border-gray-200 p-4">
          <div class="text-sm text-gray-500">${s.label}</div>
          <div class="text-2xl font-bold text-gray-900 mt-1">${s.value}</div>
        </div>
      `).join('');

      const meta = p.meta;
      document.getElementById('meta-info').textContent = meta.week_range ? `${meta.week_range[0]} ~ ${meta.week_range[1]}` : '';
    }

    function renderProjects() {
      const projects = allData.projects.projects;
      document.getElementById('project-grid').innerHTML = projects.map(p => {
        const c = levelColors[p.status_level] || levelColors.gray;
        const snapshotCount = p.weekly_snapshots.length;
        const riskCount = p.latest_risks ? p.latest_risks.length : 0;
        const memberCount = p.core_members.length;
        const studentCount = p.student_reports ? p.student_reports.length : 0;

        return `
        <div class="bg-white rounded-xl border ${c.border} hover:shadow-md transition-shadow cursor-pointer group"
             onclick="openProject('${p.id}')">
          <div class="p-5">
            <div class="flex items-start justify-between mb-3">
              <div>
                <h3 class="font-semibold text-gray-900 group-hover:text-blue-600 transition-colors">${p.name}</h3>
                <span class="text-xs text-gray-400">${p.category}</span>
              </div>
              <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium ${c.badge}">
                <span class="w-1.5 h-1.5 rounded-full ${c.dot}"></span>
                ${p.status || '未知'}
              </span>
            </div>
            <div class="text-xs text-gray-500 space-y-1.5">
              ${p.deadline ? `<div class="flex items-center gap-1.5">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/></svg>
                截止: ${p.deadline}
              </div>` : ''}
              <div class="flex items-center gap-4">
                <span class="flex items-center gap-1">
                  <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-1.053M18 10.5a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-9-2.25a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg>
                  ${memberCount}人
                </span>
                <span class="flex items-center gap-1">
                  <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
                  ${snapshotCount}周
                </span>
                ${riskCount > 0 ? `<span class="flex items-center gap-1 text-red-500">
                  <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>
                  ${riskCount}风险
                </span>` : ''}
              </div>
            </div>
            <!-- 最新进展预览 -->
            ${p.weekly_snapshots.length > 0 ? (() => {
              const latest = p.weekly_snapshots[p.weekly_snapshots.length - 1];
              const prog = latest.progress || [];
              return `<div class="mt-3 pt-3 border-t border-gray-100">
                <div class="text-xs text-gray-400 mb-1">最新进展 (${latest.date})</div>
                <div class="text-xs text-gray-600 line-clamp-2">${prog.join('；') || '-'}</div>
              </div>`;
            })() : ''}
          </div>
        </div>`;
      }).join('');
    }

    // ─── 项目详情弹窗 ───
    function openProject(projectId) {
      const p = allData.projects.projects.find(x => x.id === projectId);
      if (!p) return;

      const c = levelColors[p.status_level] || levelColors.gray;
      const modal = document.getElementById('modal');
      const overlay = document.getElementById('modal-overlay');

      // 跨周对比表格
      let weeklyTable = '';
      if (p.weekly_snapshots.length > 0) {
        const headers = p.weekly_snapshots.map(s => `<th class="px-3 py-2 text-left text-xs font-medium text-gray-500 whitespace-nowrap">${s.week}<br>${s.date}</th>`).join('');
        const rows = [
          { label: '状态', key: 'status', render: (s) => {
            const sc = levelColors[s.status_level] || levelColors.gray;
            return `<span class="inline-flex items-center gap-1 text-xs"><span class="w-1.5 h-1.5 rounded-full ${sc.dot}"></span>${s.status || '-'}</span>`;
          }},
          { label: '进展', key: 'progress', render: (s) => (s.progress || []).map(x => `<div class="text-xs text-gray-600 mb-1">- ${x}</div>`).join('') || '-' },
          { label: '计划', key: 'next_plan', render: (s) => (s.next_plan || []).map(x => `<div class="text-xs text-gray-600 mb-1">- ${x}</div>`).join('') || '-' },
          { label: '风险', key: 'risks', render: (s) => (s.risks || []).map(x => `<div class="text-xs text-red-600 mb-1">- ${x}</div>`).join('') || '<span class="text-xs text-gray-400">-</span>' },
        ];
        weeklyTable = `
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead><tr><th class="px-3 py-2 text-left text-xs font-medium text-gray-400 w-16"></th>${headers}</tr></thead>
              <tbody>${rows.map(r => `<tr class="border-t border-gray-100">
                <td class="px-3 py-2 text-xs font-medium text-gray-500 align-top whitespace-nowrap">${r.label}</td>
                ${p.weekly_snapshots.map(s => `<td class="px-3 py-2 align-top">${r.render(s)}</td>`).join('')}
              </tr>`).join('')}</tbody>
            </table>
          </div>`;
      }

      // 关联学生报告
      let studentSection = '';
      if (p.student_reports && p.student_reports.length > 0) {
        studentSection = `
          <div class="mt-6">
            <h4 class="text-sm font-semibold text-gray-700 mb-3">关联学生工作</h4>
            <div class="space-y-2">
              ${p.student_reports.map(sr => `
                <div class="bg-gray-50 rounded-lg p-3">
                  <div class="flex items-center justify-between mb-1">
                    <span class="text-xs font-medium text-gray-700">${sr.name}</span>
                    <span class="text-xs text-gray-400">${sr.date} (${sr.week})</span>
                  </div>
                  <div class="text-xs text-gray-600">${sr.work || '-'}</div>
                  ${sr.plan ? `<div class="text-xs text-blue-600 mt-1">计划: ${sr.plan}</div>` : ''}
                </div>
              `).join('')}
            </div>
          </div>`;
      }

      document.getElementById('modal-content').innerHTML = `
        <div class="flex items-center justify-between mb-6">
          <div>
            <h2 class="text-xl font-bold text-gray-900">${p.name}</h2>
            <span class="text-sm text-gray-400">${p.category} ${p.deadline ? `| 截止: ${p.deadline}` : ''}</span>
          </div>
          <button onclick="closeModal()" class="p-2 text-gray-400 hover:text-gray-600 rounded-lg hover:bg-gray-100">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>

        <div class="flex items-center gap-3 mb-4">
          <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-sm font-medium ${c.badge}">
            <span class="w-2 h-2 rounded-full ${c.dot}"></span>${p.status || '未知'}
          </span>
          <span class="text-sm text-gray-500">核心人员: ${p.core_members.join('、') || '-'}</span>
        </div>

        <h3 class="text-sm font-semibold text-gray-700 mb-3">跨周进展对比</h3>
        ${weeklyTable || '<p class="text-sm text-gray-400">暂无周报数据</p>'}

        ${studentSection}
      `;

      overlay.classList.remove('hidden');
      requestAnimationFrame(() => {
        modal.classList.remove('translate-x-full');
      });
    }

    function closeModal() {
      document.getElementById('modal').classList.add('translate-x-full');
      setTimeout(() => {
        document.getElementById('modal-overlay').classList.add('hidden');
      }, 300);
    }

    // ESC 关闭弹窗
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    init();
  </script>
</body>
</html>
