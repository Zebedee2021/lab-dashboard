<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>810 Lab - 人员周报</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-white border-b border-gray-200 sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-14">
      <span class="text-lg font-bold text-gray-900">810 Lab Dashboard</span>
      <div class="flex items-center gap-4">
        <nav class="hidden sm:flex items-center gap-1 text-sm">
          <a href="dashboard.html" class="px-3 py-1.5 rounded-md text-gray-600 hover:bg-gray-100">项目看板</a>
          <a href="person.html" class="px-3 py-1.5 rounded-md bg-blue-50 text-blue-700 font-medium">人员周报</a>
          <a href="risks.html" class="px-3 py-1.5 rounded-md text-gray-600 hover:bg-gray-100">风险追踪</a>
          <a href="feedback.html" class="px-3 py-1.5 rounded-md text-gray-600 hover:bg-gray-100">反馈记录</a>
        </nav>
        <button onclick="Auth.logout()" class="text-sm text-gray-400 hover:text-gray-600">退出</button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <!-- 筛选 -->
    <div class="flex flex-wrap items-center gap-3 mb-6">
      <select id="role-filter" class="px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white">
        <option value="all">全部角色</option>
        <option value="manager">管理层</option>
        <option value="staff">员工</option>
        <option value="student">学生</option>
      </select>
      <input id="search-input" type="text" placeholder="搜索姓名..." class="px-3 py-2 border border-gray-300 rounded-lg text-sm w-48">
    </div>
    <!-- 人员列表 -->
    <div id="person-list" class="space-y-3">
      <div class="flex items-center justify-center py-20">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
        <span class="ml-3 text-gray-500">加载中...</span>
      </div>
    </div>
  </main>

  <!-- 详情弹窗 -->
  <div id="modal-overlay" class="fixed inset-0 bg-black/40 z-40 hidden" onclick="closeModal()"></div>
  <div id="modal" class="fixed inset-y-0 right-0 w-full max-w-2xl bg-white shadow-2xl z-50 overflow-y-auto transform translate-x-full transition-transform duration-300">
    <div id="modal-content" class="p-6"></div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/data-loader.js"></script>
  <script>
    if (!Auth.requireAuth()) throw new Error('Not authenticated');

    let peopleData = null;
    const roleTags = { manager: '管理层', staff: '员工', student: '学生' };
    const roleColors = {
      manager: 'bg-purple-100 text-purple-700',
      staff: 'bg-blue-100 text-blue-700',
      student: 'bg-green-100 text-green-700',
    };

    async function init() {
      peopleData = await DataLoader.load('people');
      if (!peopleData) return;
      render();
      document.getElementById('role-filter').addEventListener('change', render);
      document.getElementById('search-input').addEventListener('input', render);
    }

    function render() {
      const role = document.getElementById('role-filter').value;
      const search = document.getElementById('search-input').value.trim().toLowerCase();
      let people = peopleData.people;
      if (role !== 'all') people = people.filter(p => p.role === role);
      if (search) people = people.filter(p => p.name.toLowerCase().includes(search));

      if (people.length === 0) {
        document.getElementById('person-list').innerHTML = '<p class="text-center text-gray-400 py-10">无匹配结果</p>';
        return;
      }

      document.getElementById('person-list').innerHTML = people.map(p => {
        const rc = roleColors[p.role] || 'bg-gray-100 text-gray-600';
        const latestReport = p.reports.length > 0 ? p.reports[p.reports.length - 1] : null;
        const latestWork = latestReport
          ? (latestReport.this_week_work || latestReport.overview || '').slice(0, 120)
          : '';

        return `
        <div class="bg-white rounded-xl border border-gray-200 p-4 hover:shadow-md transition-shadow cursor-pointer"
             onclick="openPerson('${p.name}')">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <div class="w-9 h-9 rounded-full bg-gray-200 flex items-center justify-center text-sm font-bold text-gray-600">
                ${p.name.slice(-2)}
              </div>
              <div>
                <div class="flex items-center gap-2">
                  <span class="font-medium text-gray-900">${p.name}</span>
                  <span class="px-1.5 py-0.5 rounded text-xs ${rc}">${roleTags[p.role] || p.role}</span>
                  <span class="text-xs text-gray-400">${p.department}</span>
                </div>
                <div class="text-xs text-gray-400 mt-0.5">
                  ${p.report_count}份周报 | 关联${p.related_projects.length}个项目
                </div>
              </div>
            </div>
            <svg class="w-5 h-5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
          </div>
          ${latestWork ? `<div class="mt-2 text-xs text-gray-500 line-clamp-2 pl-12">${latestWork}...</div>` : ''}
        </div>`;
      }).join('');
    }

    function openPerson(name) {
      const p = peopleData.people.find(x => x.name === name);
      if (!p) return;

      const rc = roleColors[p.role] || 'bg-gray-100 text-gray-600';

      const reportsHtml = p.reports.map(r => {
        const isStudent = r.type === 'student';
        return `
        <div class="border-l-2 border-blue-200 pl-4 pb-4">
          <div class="flex items-center gap-2 mb-2">
            <span class="text-xs font-medium text-blue-600">${r.week}</span>
            <span class="text-xs text-gray-400">${r.date}</span>
            <span class="text-xs text-gray-300">${r.rule_name}</span>
          </div>
          ${isStudent ? `
            ${r.current_tasks ? `<div class="mb-2"><span class="text-xs font-medium text-gray-500">当前任务:</span><div class="text-sm text-gray-700 mt-0.5">${r.current_tasks}</div></div>` : ''}
            ${r.this_week_work ? `<div class="mb-2"><span class="text-xs font-medium text-gray-500">本周工作:</span><div class="text-sm text-gray-700 mt-0.5">${r.this_week_work}</div></div>` : ''}
            ${r.next_plan ? `<div class="mb-2"><span class="text-xs font-medium text-gray-500">下周计划:</span><div class="text-sm text-gray-700 mt-0.5">${r.next_plan}</div></div>` : ''}
            ${r.need_help && r.need_help !== '无' && r.need_help !== '暂无' ? `<div class="mb-2"><span class="text-xs font-medium text-orange-500">需要帮助:</span><div class="text-sm text-orange-700 mt-0.5">${r.need_help}</div></div>` : ''}
          ` : `
            ${r.overview ? `<div class="mb-2"><span class="text-xs font-medium text-gray-500">整体概况:</span><div class="text-sm text-gray-700 mt-0.5">${r.overview}</div></div>` : ''}
            ${r.next_plan ? `<div class="mb-2"><span class="text-xs font-medium text-gray-500">下周计划:</span><div class="text-sm text-gray-700 mt-0.5">${r.next_plan}</div></div>` : ''}
            ${r.need_help && r.need_help !== '/' ? `<div class="mb-2"><span class="text-xs font-medium text-orange-500">需要协调:</span><div class="text-sm text-orange-700 mt-0.5">${r.need_help}</div></div>` : ''}
          `}
        </div>`;
      }).join('');

      document.getElementById('modal-content').innerHTML = `
        <div class="flex items-center justify-between mb-6">
          <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-full bg-gray-200 flex items-center justify-center text-lg font-bold text-gray-600">${p.name.slice(-2)}</div>
            <div>
              <h2 class="text-xl font-bold text-gray-900">${p.name}</h2>
              <div class="flex items-center gap-2 mt-0.5">
                <span class="px-2 py-0.5 rounded text-xs ${rc}">${roleTags[p.role]}</span>
                <span class="text-sm text-gray-400">${p.department}</span>
                <span class="text-sm text-gray-400">${p.report_count}份周报</span>
              </div>
            </div>
          </div>
          <button onclick="closeModal()" class="p-2 text-gray-400 hover:text-gray-600 rounded-lg hover:bg-gray-100">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>

        ${p.related_projects.length > 0 ? `
        <div class="mb-4">
          <span class="text-xs text-gray-500">关联项目: </span>
          ${p.related_projects.map(pid => `<span class="inline-block px-2 py-0.5 bg-blue-50 text-blue-600 rounded text-xs mr-1">${pid}</span>`).join('')}
        </div>` : ''}

        <h3 class="text-sm font-semibold text-gray-700 mb-4">周报时间线</h3>
        <div class="space-y-1">${reportsHtml || '<p class="text-sm text-gray-400">暂无周报</p>'}</div>
      `;

      document.getElementById('modal-overlay').classList.remove('hidden');
      requestAnimationFrame(() => {
        document.getElementById('modal').classList.remove('translate-x-full');
      });
    }

    function closeModal() {
      document.getElementById('modal').classList.add('translate-x-full');
      setTimeout(() => document.getElementById('modal-overlay').classList.add('hidden'), 300);
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    init();
  </script>
</body>
</html>
