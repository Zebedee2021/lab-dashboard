<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>810 Lab Dashboard - 登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm mx-auto px-4">
    <div class="bg-white rounded-2xl shadow-lg border border-gray-200 p-8">
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.3 24.3 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0112 15a9.065 9.065 0 00-6.23.693L5 14.5m14.8.8l1.402 1.402c1.232 1.232.65 3.318-1.067 3.611A48.309 48.309 0 0112 21c-2.773 0-5.491-.235-8.135-.687-1.718-.293-2.3-2.379-1.067-3.61L5 14.5"/>
          </svg>
        </div>
        <h1 class="text-xl font-bold text-gray-900">810 Lab Dashboard</h1>
        <p class="text-sm text-gray-500 mt-1">实验室项目管理系统</p>
      </div>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">访问密码</label>
          <input type="password" id="password-input"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors"
            placeholder="请输入实验室访问密码" autofocus>
        </div>
        <div id="error-msg" class="text-sm text-red-600 hidden">密码错误，请重新输入</div>
        <button type="submit" id="login-btn"
          class="w-full py-2.5 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
          进入系统
        </button>
      </form>
    </div>
    <p class="text-center text-xs text-gray-400 mt-6">数据已加密存储，关闭标签页后需重新登录</p>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // 已登录则直接跳转
    if (Auth.isLoggedIn()) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('error-msg');
      const pwd = document.getElementById('password-input').value;

      if (!pwd) return;
      btn.disabled = true;
      btn.textContent = '验证中...';
      errEl.classList.add('hidden');

      const ok = await Auth.login(pwd);
      if (ok) {
        window.location.href = 'dashboard.html';
      } else {
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = '进入系统';
      }
    });
  </script>
</body>
</html>
